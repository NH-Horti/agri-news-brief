name: agri-news-brief (apply branch protection)

on:
  workflow_dispatch:
    inputs:
      required_contexts:
        description: 'Required status check contexts (comma-separated)'
        required: false
        default: 'agri-news-brief (ci) / lint-and-test'
        type: string

permissions:
  contents: read

jobs:
  apply-main-branch-protection:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply protection to main
        env:
          ADMIN_GITHUB_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          BRANCH_PROTECTION_REQUIRED_CONTEXTS: ${{ inputs.required_contexts }}
        run: |
          python scripts/apply_branch_protection.py
