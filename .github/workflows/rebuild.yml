name: agri-news-brief (rebuild a date)

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Date to rebuild (YYYY-MM-DD)'
        required: true
        type: string
      ux_patch_days:
        description: 'Also patch recent archives after rebuild (0 = off)'
        required: false
        default: '0'
        type: string
      send_kakao:
        description: 'Send Kakao message after rebuild (true/false)'
        required: false
        default: 'true'
        type: string
      max_per_section:
        description: 'Max items per section on the page (core2 + general)'
        required: false
        default: '5'
        type: string
      debug:
        description: 'Write debug report (HTML + JSON) (true/false)'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write

concurrency:
  group: agri-news-brief-rebuild
  cancel-in-progress: false

jobs:
  run:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Resolve run variables
        id: vars
        shell: bash
        env:
          INPUT_REPORT_DATE: ${{ inputs.report_date }}
          INPUT_UX_PATCH_DAYS: ${{ inputs.ux_patch_days }}
          INPUT_SEND_KAKAO: ${{ inputs.send_kakao }}
          INPUT_MAX_PER_SECTION: ${{ inputs.max_per_section }}
          INPUT_DEBUG: ${{ inputs.debug }}
        run: |
          set -euo pipefail

          report_date="$INPUT_REPORT_DATE"
          ux_patch_days="$INPUT_UX_PATCH_DAYS"
          send_kakao="$INPUT_SEND_KAKAO"
          max_per_section="$INPUT_MAX_PER_SECTION"
          debug_input="$INPUT_DEBUG"

          if [ -z "$ux_patch_days" ]; then
            ux_patch_days='0'
          fi

          if [ -z "$send_kakao" ]; then
            send_kakao='true'
          fi

          if [ -z "$max_per_section" ]; then
            max_per_section='5'
          fi

          if [ "$debug_input" = 'true' ]; then
            debug_enabled='1'
          else
            debug_enabled='0'
          fi

          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
          echo "ux_patch_days=$ux_patch_days" >> "$GITHUB_OUTPUT"
          echo "send_kakao=$send_kakao" >> "$GITHUB_OUTPUT"
          echo "max_per_section=$max_per_section" >> "$GITHUB_OUTPUT"
          echo "debug_enabled=$debug_enabled" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run smoke checks before rebuild
        id: smoke
        run: |
          python scripts/run_smoke_checks.py

      - name: Rebuild
        id: rebuild
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_CONTENT_REF: 'main'
          GH_CONTENT_BRANCH: 'main'

          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
          OPENAI_REASONING_EFFORT: low
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SEMANTIC_MODEL: intfloat/multilingual-e5-large
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_STATUS_FILE: ${{ runner.temp }}/kakao-status.txt
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: main
          PAGES_FILE_PATH: docs/index.html
          BRIEF_VIEW_URL: https://nh-horti.github.io/agri-news-brief/

          MAINTENANCE_TASK: rebuild_date
          FORCE_REPORT_DATE: ${{ steps.vars.outputs.report_date }}
          MAINTENANCE_SEND_KAKAO: ${{ steps.vars.outputs.send_kakao }}
          REPLAY_WRITE_SNAPSHOT: 'true'
          REPLAY_SNAPSHOT_DIR: .agri_replay
          MAX_PER_SECTION: ${{ steps.vars.outputs.max_per_section }}

          FORCE_RUN_ANYDAY: 'false'
          UX_PATCH_DAYS: ${{ steps.vars.outputs.ux_patch_days }}
          WINDOW_MIN_HOURS: '0'
          CROSSDAY_DEDUPE_ENABLED: 'false'

          NAVER_MAX_WORKERS: '2'
          NAVER_MIN_INTERVAL_SEC: '0.6'

          DEBUG_REPORT: ${{ steps.vars.outputs.debug_enabled }}
          DEBUG_REPORT_WRITE_JSON: ${{ steps.vars.outputs.debug_enabled }}
          DEBUG_REPORT_MAX_CANDIDATES: '200'
          DEBUG_REPORT_MAX_REJECTS: '2000'

        run: |
          python main.py

      - name: Publish replay snapshot
        if: steps.rebuild.outcome == 'success'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          snapshot_path=".agri_replay/${{ steps.vars.outputs.report_date }}.snapshot.json"
          if [ ! -f "$snapshot_path" ]; then
            echo "Replay snapshot was not generated: $snapshot_path"
            exit 1
          fi

          python scripts/replay_snapshot_repo.py push \
            --repo "$REPO" \
            --token "$GITHUB_TOKEN" \
            --branch main \
            --remote-path "docs/replay/${{ steps.vars.outputs.report_date }}.snapshot.json" \
            --input "$snapshot_path" \
            --message "Update replay snapshot (${{ steps.vars.outputs.report_date }})"

      - name: Resolve Kakao status
        if: always()
        id: kakao_status
        shell: bash
        run: |
          set -euo pipefail

          actual='not_requested'
          if [ '${{ steps.vars.outputs.send_kakao }}' = 'true' ]; then
            actual='not_attempted'
            if [ -f "$RUNNER_TEMP/kakao-status.txt" ]; then
              actual="$(tr -d '\r\n' < "$RUNNER_TEMP/kakao-status.txt")"
              if [ -z "$actual" ]; then
                actual='not_attempted'
              fi
            fi
          fi

          echo "actual=$actual" >> "$GITHUB_OUTPUT"

      - name: Verify rebuilt production archive content
        id: verify_archive
        shell: bash
        run: |
          set -euo pipefail

          archive_path="docs/archive/${{ steps.vars.outputs.report_date }}.html"
          if [ ! -f "$archive_path" ]; then
            echo "Archive file was not generated: $archive_path"
            exit 1
          fi

          final_archive_path="$RUNNER_TEMP/prod-archive-final.html"
          awk '/<details class="dbgWrap">/{exit} {print}' "$archive_path" > "$final_archive_path"

          blocked_urls=(
            'https://www.mt.co.kr/politics/2026/03/10/2026031009405991292'
            'https://news.kbs.co.kr/news/pc/view/view.do?ncd=8504583'
          )

          failed=0
          for url in "${blocked_urls[@]}"; do
            if grep -Fq "$url" "$final_archive_path"; then
              echo "Blocked URL still present in final archive content: $url"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Upload rebuild artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rebuild-${{ steps.vars.outputs.report_date }}
          if-no-files-found: ignore
          path: |
            docs/archive/${{ steps.vars.outputs.report_date }}.html
            docs/index.html
            docs/search_index.json
            docs/debug/

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Rebuild Summary'
            echo "- Event: ${{ github.event_name }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Report date: ${{ steps.vars.outputs.report_date }}"
            echo "- Smoke checks: ${{ steps.smoke.outcome }}"
            echo "- Rebuild: ${{ steps.rebuild.outcome }}"
            echo "- Archive verify: ${{ steps.verify_archive.outcome }}"
            echo "- OpenAI model: gpt-5.4"
            echo "- Kakao requested: ${{ steps.vars.outputs.send_kakao }}"
            echo "- Kakao actual: ${{ steps.kakao_status.outputs.actual }}"
            echo "- Archive: https://nh-horti.github.io/agri-news-brief/archive/${{ steps.vars.outputs.report_date }}.html"
            echo "- Debug JSON: https://nh-horti.github.io/agri-news-brief/debug/${{ steps.vars.outputs.report_date }}.json"
          } >> "$GITHUB_STEP_SUMMARY"
