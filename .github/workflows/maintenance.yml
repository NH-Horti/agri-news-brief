name: agri-news-brief (maintenance - backfill)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backfill start date (YYYY-MM-DD). Optional.'
        required: false
        type: string
      end_date:
        description: 'Backfill end date (YYYY-MM-DD). Optional.'
        required: false
        type: string
      backfill_days:
        description: 'If start/end are empty: rebuild last N days'
        required: false
        default: '14'
        type: string
      create_missing:
        description: 'Create missing pages (true/false)'
        required: false
        default: true
        type: boolean
      skip_openai:
        description: 'Skip OpenAI summaries to run faster (true/false)'
        required: false
        default: false
        type: boolean
      debug:
        description: 'Write debug JSON for rebuilt archive pages (true/false)'
        required: false
        default: true
        type: boolean
      sleep_sec:
        description: 'Backfill pacing (seconds)'
        required: false
        default: '0.2'
        type: string
      include_nonbusiness_days:
        description: 'Include weekends/holidays in backfill (true/false)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: agri-news-brief-backfill
  cancel-in-progress: false

jobs:
  run:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run smoke checks before backfill
        run: |
          python scripts/run_smoke_checks.py

      - name: Backfill rebuild
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_CONTENT_REF: 'main'
          GH_CONTENT_BRANCH: 'main'

          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
          OPENAI_REASONING_EFFORT: low
          OPENAI_SUMMARY_FEEDBACK_PATH: docs/evals/latest-feedback.txt
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SEMANTIC_MODEL: intfloat/multilingual-e5-large
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: main
          PAGES_FILE_PATH: docs/index.html
          BRIEF_VIEW_URL: https://nh-horti.github.io/agri-news-brief/

          MAINTENANCE_TASK: backfill_rebuild
          FORCE_REPORT_DATE: ${{ inputs.end_date }}

          BACKFILL_START_DATE: ${{ inputs.start_date }}
          BACKFILL_END_DATE: ${{ inputs.end_date }}
          BACKFILL_REBUILD_DAYS: ${{ inputs.backfill_days }}
          BACKFILL_REBUILD_CREATE_MISSING: ${{ inputs.create_missing }}
          BACKFILL_REBUILD_SKIP_OPENAI: ${{ inputs.skip_openai }}
          BACKFILL_REBUILD_SLEEP_SEC: ${{ inputs.sleep_sec }}
          BACKFILL_INCLUDE_NONBUSINESS_DAYS: ${{ inputs.include_nonbusiness_days }}
          REPLAY_WRITE_SNAPSHOT: 'true'
          REPLAY_SNAPSHOT_DIR: .agri_replay

          WINDOW_MIN_HOURS: '0'
          CROSSDAY_DEDUPE_ENABLED: 'false'

          MAX_PER_SECTION: '5'
          PAGE_TAIL_MARGIN_EXTRA: '4.0'

          NAVER_MAX_WORKERS: '2'
          NAVER_MIN_INTERVAL_SEC: '0.6'
          DEBUG_REPORT: ${{ inputs.debug && '1' || '0' }}
          DEBUG_REPORT_WRITE_JSON: ${{ inputs.debug && '1' || '0' }}
          DEBUG_REPORT_MAX_CANDIDATES: '200'
          DEBUG_REPORT_MAX_REJECTS: '2000'

        run: |
          python main.py

      - name: Publish replay snapshots
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          count=0
          for snapshot_path in .agri_replay/*.snapshot.json; do
            name="$(basename "$snapshot_path")"
            python scripts/replay_snapshot_repo.py push \
              --repo "$REPO" \
              --token "$GITHUB_TOKEN" \
              --branch main \
              --remote-path "docs/replay/${name}" \
              --input "$snapshot_path" \
              --message "Update replay snapshot (${name})"
            count=$((count + 1))
          done

          echo "Published replay snapshots: $count"
