name: agri-news-brief (ci)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Prepare reports dir
        run: mkdir -p reports

      - name: Syntax check
        id: syntax
        continue-on-error: true
        run: |
          set -o pipefail
          python -m py_compile main.py collector.py io_github.py retry_utils.py schemas.py ux_patch.py ranking.py orchestrator.py observability.py 2>&1 | tee reports/py_compile.log

      - name: Type check (mypy strict modules)
        id: mypy
        continue-on-error: true
        run: |
          set -o pipefail
          python -m mypy --config-file mypy.ini --show-error-codes 2>&1 | tee reports/mypy.log

      - name: Run regression tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee reports/unittest.log

      - name: Publish check summary
        if: always()
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Syntax: ${{ steps.syntax.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mypy: ${{ steps.mypy.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests: ${{ steps.tests.outcome }}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.syntax.outcome }}" = "failure" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Syntax check (last 80 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`text" >> "$GITHUB_STEP_SUMMARY"
            tail -n 80 reports/py_compile.log >> "$GITHUB_STEP_SUMMARY" || true
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.mypy.outcome }}" = "failure" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Mypy (last 120 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`text" >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 reports/mypy.log >> "$GITHUB_STEP_SUMMARY" || true
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Tests (last 120 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`text" >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 reports/unittest.log >> "$GITHUB_STEP_SUMMARY" || true
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: reports/

      - name: Fail if any check failed
        if: steps.syntax.outcome == 'failure' || steps.mypy.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: |
          echo "CI checks failed."
          echo "syntax=${{ steps.syntax.outcome }} mypy=${{ steps.mypy.outcome }} tests=${{ steps.tests.outcome }}"

          if [ "${{ steps.syntax.outcome }}" = "failure" ]; then
            echo "::group::Syntax check tail"
            tail -n 120 reports/py_compile.log || true
            echo "::endgroup::"
          fi

          if [ "${{ steps.mypy.outcome }}" = "failure" ]; then
            echo "::group::Mypy tail"
            tail -n 160 reports/mypy.log || true
            echo "::endgroup::"
          fi

          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "::group::Tests tail"
            tail -n 160 reports/unittest.log || true
            echo "::endgroup::"
          fi

          exit 1
