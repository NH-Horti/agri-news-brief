name: agri-news-brief (ci)

on:
  push:
    branches-ignore:
      - codex/dev-preview
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Prepare reports dir
        run: mkdir -p reports

      - name: Syntax check
        id: syntax
        run: |
          set -o pipefail
          python -m py_compile main.py collector.py io_github.py retry_utils.py schemas.py ux_patch.py ranking.py orchestrator.py observability.py replay.py hf_semantics.py 2>&1 | tee reports/py_compile.log

      - name: Type check (mypy strict modules)
        id: mypy
        run: |
          set -o pipefail
          python -m mypy --config-file mypy.ini --show-error-codes 2>&1 | tee reports/mypy.log

      - name: Run regression tests
        id: tests
        run: |
          set -o pipefail
          python scripts/run_ci_regression_suite.py 2>&1 | tee reports/unittest.log

      - name: Publish check summary
        if: always()
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Syntax: ${{ steps.syntax.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mypy: ${{ steps.mypy.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tests: ${{ steps.tests.outcome }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-reports
          path: reports/
