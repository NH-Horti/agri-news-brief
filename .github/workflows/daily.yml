name: agri-news-brief (daily)

on:
  schedule:
    # 월요일(일요일 UTC): KST 05:00 — 주말 72h 윈도우 대응 (early-start margin 2h 적용)
    - cron: '0 20 * * 0'
    # 화~금(월~목 UTC): KST 06:05 — off-peak minute 로 GH Actions 스케줄러 지연 최소화
    # 2026-04-11: 정각(:00)은 GH Actions 로드 피크로 평균 37-49분 지연 발생
    #             → :05 off-peak 로 5-15분 지연 기대 (기사 발행 원칙 "전일 06:00 ~ 당일 06:00" 유지)
    # 평일 window 는 여전히 전일 06:00 ~ 당일 06:00 (cutoff 기준 불변)
    - cron: '5 21 * * 1-4'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: agri-news-brief-daily
  cancel-in-progress: true

jobs:
  run:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Resolve run variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          report_date="$(TZ=Asia/Seoul date +%F)"
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_CONTENT_REF: 'main'
          GH_CONTENT_BRANCH: 'main'

          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
          OPENAI_REASONING_EFFORT: low
          OPENAI_SUMMARY_FEEDBACK_PATH: docs/evals/latest-feedback.txt
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SEMANTIC_MODEL: intfloat/multilingual-e5-large
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_STATUS_FILE: ${{ runner.temp }}/kakao-status.txt
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: main
          PAGES_FILE_PATH: docs/index.html
          BRIEF_VIEW_URL: https://nh-horti.github.io/agri-news-brief/

          MAINTENANCE_TASK: ''
          FORCE_REPORT_DATE: ''
          FORCE_RUN_ANYDAY: 'false'
          REPLAY_WRITE_SNAPSHOT: 'true'
          REPLAY_SNAPSHOT_DIR: .agri_replay
          UX_PATCH_DAYS: '7'
          WINDOW_MIN_HOURS: '0'
          CROSSDAY_DEDUPE_ENABLED: 'true'
          CROSSDAY_DEDUPE_DAYS: '7'

          MAX_PER_SECTION: '5'
          PAGE_TAIL_MARGIN_EXTRA: '4.0'

          NAVER_MAX_WORKERS: '6'
          NAVER_MIN_INTERVAL_SEC: '0.3'
          BODY_CRAWL_MAX_WORKERS: '20'
          DEBUG_REPORT: '1'
          DEBUG_REPORT_WRITE_JSON: '0'
          DEBUG_REPORT_MAX_CANDIDATES: '200'
          DEBUG_REPORT_MAX_REJECTS: '2000'

        run: |
          python main.py

      - name: Publish replay snapshot
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          snapshot_path=".agri_replay/${{ steps.vars.outputs.report_date }}.snapshot.json"
          if [ ! -f "$snapshot_path" ]; then
            echo "::warning::Replay snapshot was not generated: $snapshot_path"
            exit 0
          fi

          python scripts/replay_snapshot_repo.py push \
            --repo "$REPO" \
            --token "$GITHUB_TOKEN" \
            --branch main \
            --remote-path "docs/replay/${{ steps.vars.outputs.report_date }}.snapshot.json" \
            --input "$snapshot_path" \
            --message "Update replay snapshot (${{ steps.vars.outputs.report_date }})"

      - name: Evaluate daily report quality
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          python scripts/evaluate_daily_report.py \
            --report-date "${{ steps.vars.outputs.report_date }}" \
            --snapshot-path ".agri_replay/${{ steps.vars.outputs.report_date }}.snapshot.json" \
            --repo "$REPO" \
            --token "$GITHUB_TOKEN" \
            --ref main \
            --publish-branch main \
            --output-json "reports/evals/${{ steps.vars.outputs.report_date }}.json" \
            --output-md "reports/evals/${{ steps.vars.outputs.report_date }}.md" \
            --feedback-out "reports/evals/latest-feedback.txt" \
            --selection-feedback-out "reports/evals/latest-selection-feedback.json" \
            --fail-under 55

      - name: Resolve Kakao status
        if: always()
        id: kakao_status
        shell: bash
        run: |
          set -euo pipefail

          actual='not_attempted'
          if [ -f "$RUNNER_TEMP/kakao-status.txt" ]; then
            actual="$(tr -d '\r\n' < "$RUNNER_TEMP/kakao-status.txt")"
            if [ -z "$actual" ]; then
              actual='not_attempted'
            fi
          fi

          echo "actual=$actual" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Daily Summary'
            echo "- Event: ${{ github.event_name }}"
            echo "- Report date: ${{ steps.vars.outputs.report_date }}"
            echo "- OpenAI model: gpt-5.4"
            echo "- Kakao actual: ${{ steps.kakao_status.outputs.actual }}"
            echo "- Main page: https://nh-horti.github.io/agri-news-brief/"
            echo "- Archive: https://nh-horti.github.io/agri-news-brief/archive/${{ steps.vars.outputs.report_date }}.html"
            echo "- Eval JSON: https://raw.githubusercontent.com/${{ github.repository }}/main/docs/evals/${{ steps.vars.outputs.report_date }}.json"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f "reports/evals/${{ steps.vars.outputs.report_date }}.md" ]; then
            cat "reports/evals/${{ steps.vars.outputs.report_date }}.md" >> "$GITHUB_STEP_SUMMARY"
          fi
