name: agri-news-brief (auto promote dev to main)

on:
  workflow_run:
    workflows:
      - agri-news-brief (dev verify rebuild)
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: agri-news-brief-auto-promote-main
  cancel-in-progress: false

jobs:
  promote:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: main
          fetch-depth: 0

      - name: Fast-forward main to verified dev
        id: promote
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main dev
          git checkout -B main origin/main

          before_sha="$(git rev-parse origin/main)"
          dev_sha="$(git rev-parse origin/dev)"

          if ! git merge-base --is-ancestor origin/main origin/dev; then
            echo "origin/main is not an ancestor of origin/dev. Reconcile dev before promotion."
            exit 1
          fi

          git merge --ff-only origin/dev
          after_sha="$(git rev-parse HEAD)"

          promoted='false'
          if [ "$after_sha" != "$before_sha" ]; then
            git push origin HEAD:main
            promoted='true'
          fi

          echo "before_sha=$before_sha" >> "$GITHUB_OUTPUT"
          echo "dev_sha=$dev_sha" >> "$GITHUB_OUTPUT"
          echo "after_sha=$after_sha" >> "$GITHUB_OUTPUT"
          echo "promoted=$promoted" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Auto Promote Summary'
            echo "- Dev workflow run: ${{ github.event.workflow_run.id }}"
            echo "- Dev head branch: ${{ github.event.workflow_run.head_branch }}"
            echo "- Promoted: ${{ steps.promote.outputs.promoted }}"
            echo "- Main before: ${{ steps.promote.outputs.before_sha }}"
            echo "- Dev target: ${{ steps.promote.outputs.dev_sha }}"
            echo "- Main after: ${{ steps.promote.outputs.after_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
