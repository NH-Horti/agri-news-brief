name: agri-news-brief (promote to production)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to promote from (e.g. develop)'
        required: true
        default: 'develop'
        type: string
      source_sha:
        description: 'Pinned commit SHA to promote (required)'
        required: true
        type: string
      run_validation:
        description: 'Run py_compile/mypy/tests on source SHA before merge'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: agri-news-brief-promote
  cancel-in-progress: false

jobs:
  promote:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify source branch and pinned SHA
        env:
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail

          if [ "$SOURCE_BRANCH" = "main" ]; then
            echo "[ERROR] source_branch=main is not allowed for promote workflow."
            exit 1
          fi

          git fetch --no-tags origin main "$SOURCE_BRANCH"
          git checkout -B main origin/main

          git cat-file -e "${SOURCE_SHA}^{commit}"

          if ! git merge-base --is-ancestor "$SOURCE_SHA" "origin/$SOURCE_BRANCH"; then
            echo "[ERROR] source_sha is not reachable from origin/$SOURCE_BRANCH"
            exit 1
          fi

          if ! git merge-base --is-ancestor "origin/main" "$SOURCE_SHA"; then
            echo "[ERROR] Fast-forward promotion is not possible. Rebase/cherry-pick source branch first."
            exit 1
          fi

          echo "SOURCE_SHA_SHORT=${SOURCE_SHA:0:12}" >> "$GITHUB_ENV"

      - name: Setup Python
        if: ${{ inputs.run_validation }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps (validation)
        if: ${{ inputs.run_validation }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Revalidate pinned SHA
        if: ${{ inputs.run_validation }}
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          git checkout --detach "$SOURCE_SHA"

          python -m py_compile main.py collector.py io_github.py retry_utils.py schemas.py ux_patch.py ranking.py orchestrator.py observability.py
          python -m mypy --config-file mypy.ini --show-error-codes
          python -m unittest discover -s tests -p "test_*.py"

          git checkout -B main origin/main

      - name: Create rollback tag
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          ts="$(date -u +%Y%m%d%H%M%S)"
          tag="pre-prod-${ts}-${GITHUB_RUN_ID}"
          git tag -a "$tag" origin/main -m "Rollback point before promoting ${SOURCE_SHA}"
          echo "ROLLBACK_TAG=$tag" >> "$GITHUB_ENV"
          echo "[INFO] rollback tag prepared: $tag"

      - name: Promote to main (fast-forward)
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          git checkout -B main origin/main
          git merge --ff-only "$SOURCE_SHA"
          git push origin main
          git push origin "$ROLLBACK_TAG"

      - name: Summary
        run: |
          echo "## Promote Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- source branch: \\`${{ inputs.source_branch }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- source sha: \\`${{ inputs.source_sha }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- rollback tag: \\`${ROLLBACK_TAG}\\`" >> "$GITHUB_STEP_SUMMARY"
