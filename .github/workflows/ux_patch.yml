name: agri-news-brief (ux patch)

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Patch archives in the last N days'
        required: false
        default: '180'
        type: string

permissions:
  contents: write

concurrency:
  group: agri-news-brief-uxpatch
  cancel-in-progress: false

jobs:
  run:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: UX patch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_CONTENT_REF: 'main'
          GH_CONTENT_BRANCH: 'main'

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: main
          PAGES_FILE_PATH: docs/index.html
          BRIEF_VIEW_URL: https://nh-horti.github.io/agri-news-brief/

          MAINTENANCE_TASK: ux_patch
          UX_PATCH_DAYS: ${{ inputs.days }}
          FORCE_REPORT_DATE: ''
          FORCE_RUN_ANYDAY: 'false'
          UX_PATCH_STRICT: 'true'

        run: |
          python main.py

      - name: Post-run healthcheck
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEALTHCHECK_CONTENT_REF: main
          HEALTHCHECK_EXPECTED_FILES: docs/index.html,.agri_archive.json,docs/archive_manifest.json
          HEALTHCHECK_BASE_URL: https://nh-horti.github.io/agri-news-brief/
          HEALTHCHECK_EXPECTED_HOST: nh-horti.github.io
          HEALTHCHECK_EXPECTED_PATH_PREFIX: /agri-news-brief
        run: |
          python scripts/post_run_healthcheck.py
