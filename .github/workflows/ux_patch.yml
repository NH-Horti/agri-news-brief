name: agri-news-brief (ux patch)

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Patch archives in the last N days'
        required: false
        default: '180'
        type: string

permissions:
  contents: write

concurrency:
  group: agri-news-brief-uxpatch
  cancel-in-progress: false

jobs:
  run:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: UX patch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_CONTENT_REF: 'main'
          GH_CONTENT_BRANCH: 'main'

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: main
          PAGES_FILE_PATH: docs/index.html
          BRIEF_VIEW_URL: https://nh-horti.github.io/agri-news-brief/

          MAINTENANCE_TASK: ux_patch
          UX_PATCH_DAYS: ${{ inputs.days || '180' }}
          FORCE_REPORT_DATE: ''
          FORCE_RUN_ANYDAY: 'false'
          UX_PATCH_STRICT: 'true'

        run: |
          python main.py
