name: agri-news-brief (dev verify rebuild)

on:
  schedule:
    # KST 06:00 on weekdays (Mon-Fri) == UTC 21:00 on Sun-Thu
    - cron: '0 21 * * 0-4'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Date to rebuild on dev run (YYYY-MM-DD). Leave empty to use current KST date.'
        required: false
        default: ''
        type: string
      send_kakao:
        description: 'Send Kakao message in dev verification run'
        required: false
        default: false
        type: boolean
      brief_view_url:
        description: 'Preview base URL used in Kakao link'
        required: false
        default: 'https://nh-horti.github.io/agri-news-brief/dev'
        type: string
      ux_patch_days:
        description: 'Patch recent archives after rebuild (0 = off)'
        required: false
        default: '0'
        type: string
      build_mode:
        description: 'Build mode for manual runs (auto/replay/live)'
        required: false
        default: 'auto'
        type: string
  push:
    branches:
      - dev
    paths:
      - 'main.py'
      - 'collector.py'
      - 'io_github.py'
      - 'retry_utils.py'
      - 'schemas.py'
      - 'ux_patch.py'
      - 'ranking.py'
      - 'orchestrator.py'
      - 'observability.py'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/dev-verify.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'

permissions:
  contents: write

concurrency:
  group: agri-news-brief-dev-verify-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  run:
    if: github.event_name == 'schedule' || github.ref_name == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: ${{ github.event_name == 'schedule' && 'dev' || github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Resolve run variables
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_REPORT_DATE: ${{ inputs.report_date }}
          INPUT_SEND_KAKAO: ${{ inputs.send_kakao }}
          INPUT_BRIEF_VIEW_URL: ${{ inputs.brief_view_url }}
          INPUT_UX_PATCH_DAYS: ${{ inputs.ux_patch_days }}
          INPUT_BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = 'schedule' ]; then
            content_ref='dev'
          else
            content_ref="$REF_NAME"
          fi

          if [ -n "$INPUT_REPORT_DATE" ]; then
            report_date="$INPUT_REPORT_DATE"
          else
            report_date="$(TZ=Asia/Seoul date +%F)"
          fi

          if [ "$EVENT_NAME" = 'schedule' ]; then
            send_kakao='true'
          elif [ "$EVENT_NAME" = 'workflow_dispatch' ] && [ "$INPUT_SEND_KAKAO" = 'true' ]; then
            send_kakao='true'
          else
            send_kakao='false'
          fi

          brief_view_url="$INPUT_BRIEF_VIEW_URL"
          if [ -z "$brief_view_url" ]; then
            brief_view_url='https://nh-horti.github.io/agri-news-brief/dev'
          fi

          ux_patch_days="$INPUT_UX_PATCH_DAYS"
          if [ -z "$ux_patch_days" ]; then
            ux_patch_days='0'
          fi

          requested_build_mode='auto'
          if [ "$EVENT_NAME" = 'workflow_dispatch' ] && [ -n "$INPUT_BUILD_MODE" ]; then
            requested_build_mode="$INPUT_BUILD_MODE"
          fi

          echo "content_ref=$content_ref" >> "$GITHUB_OUTPUT"
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
          echo "send_kakao=$send_kakao" >> "$GITHUB_OUTPUT"
          echo "brief_view_url=$brief_view_url" >> "$GITHUB_OUTPUT"
          echo "ux_patch_days=$ux_patch_days" >> "$GITHUB_OUTPUT"
          echo "requested_build_mode=$requested_build_mode" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run smoke checks before rebuild
        id: smoke
        run: |
          python scripts/run_smoke_checks.py

      - name: Resolve replay snapshot
        id: replay
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          report_date='${{ steps.vars.outputs.report_date }}'
          requested='${{ steps.vars.outputs.requested_build_mode }}'
          actual="$requested"
          source='none'
          snapshot_path=".agri_replay/${report_date}.snapshot.json"

          mkdir -p .agri_replay

          if [ "$requested" != 'live' ]; then
            if python scripts/replay_snapshot_repo.py fetch --repo "$REPO" --token "$GITHUB_TOKEN" --ref codex/dev-preview --remote-path "docs/dev/replay/${report_date}.snapshot.json" --output "$snapshot_path"; then
              actual='replay'
              source='dev-preview'
            elif python scripts/replay_snapshot_repo.py fetch --repo "$REPO" --token "$GITHUB_TOKEN" --ref main --remote-path "docs/replay/${report_date}.snapshot.json" --output "$snapshot_path"; then
              actual='replay'
              source='main'
            elif [ "$requested" = 'replay' ]; then
              echo "Replay snapshot not found for ${report_date} on codex/dev-preview or main."
              exit 1
            else
              actual='live'
              rm -f "$snapshot_path"
            fi
          fi

          echo "actual_build_mode=$actual" >> "$GITHUB_OUTPUT"
          echo "snapshot_source=$source" >> "$GITHUB_OUTPUT"

      - name: Dev verify rebuild (single preview page overwrite)
        id: rebuild
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_CONTENT_REF: ${{ steps.vars.outputs.content_ref }}
          GH_CONTENT_BRANCH: codex/dev-preview

          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
          OPENAI_REASONING_EFFORT: low
          OPENAI_SUMMARY_FEEDBACK_PATH: docs/evals/latest-feedback.txt
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SEMANTIC_MODEL: intfloat/multilingual-e5-large
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_STATUS_FILE: ${{ runner.temp }}/kakao-status.txt

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: codex/dev-preview
          PAGES_FILE_PATH: docs/dev/index.html
          PAGES_BASE_URL: ${{ steps.vars.outputs.brief_view_url }}
          BRIEF_VIEW_URL: ${{ steps.vars.outputs.brief_view_url }}
          DEV_PREVIEW_ASSET_BASE_URL: https://raw.githubusercontent.com/NH-Horti/agri-news-brief/codex/dev-preview/docs/dev

          DEV_SINGLE_PAGE_MODE: 'true'
          DEV_SINGLE_PAGE_PATH: docs/dev/index.html
          DEV_SINGLE_PAGE_URL_PATH: index.html

          MAINTENANCE_TASK: ${{ steps.replay.outputs.actual_build_mode == 'replay' && 'replay_date' || 'rebuild_date' }}
          FORCE_REPORT_DATE: ${{ steps.vars.outputs.report_date }}
          MAINTENANCE_SEND_KAKAO: ${{ steps.vars.outputs.send_kakao }}
          REPLAY_ALLOW_OPENAI: 'false'
          REPLAY_WRITE_SNAPSHOT: ${{ steps.replay.outputs.actual_build_mode == 'replay' && 'false' || 'true' }}
          REPLAY_SNAPSHOT_DIR: .agri_replay

          FORCE_RUN_ANYDAY: 'true'
          UX_PATCH_DAYS: ${{ steps.vars.outputs.ux_patch_days }}
          WINDOW_MIN_HOURS: '0'
          CROSSDAY_DEDUPE_ENABLED: 'false'

          MAX_PER_SECTION: '5'
          PAGE_TAIL_MARGIN_EXTRA: '4.0'

          NAVER_MAX_WORKERS: '4'
          NAVER_MIN_INTERVAL_SEC: '0.35'

          DEBUG_REPORT: '1'
          DEBUG_REPORT_WRITE_JSON: '1'
          DEBUG_REPORT_MAX_CANDIDATES: '200'
          DEBUG_REPORT_MAX_REJECTS: '2000'

        run: |
          python main.py

      - name: Publish replay snapshot
        if: steps.rebuild.outcome == 'success' && steps.replay.outputs.actual_build_mode != 'replay'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          snapshot_path=".agri_replay/${{ steps.vars.outputs.report_date }}.snapshot.json"
          if [ ! -f "$snapshot_path" ]; then
            echo "::warning::Replay snapshot was not generated: $snapshot_path"
            exit 0
          fi

          python scripts/replay_snapshot_repo.py push \
            --repo "$REPO" \
            --token "$GITHUB_TOKEN" \
            --branch codex/dev-preview \
            --remote-path "docs/dev/replay/${{ steps.vars.outputs.report_date }}.snapshot.json" \
            --input "$snapshot_path" \
            --message "Update dev replay snapshot (${{ steps.vars.outputs.report_date }})"

      - name: Resolve Kakao status
        if: always()
        id: kakao_status
        shell: bash
        run: |
          set -euo pipefail

          actual='not_requested'
          if [ '${{ steps.vars.outputs.send_kakao }}' = 'true' ]; then
            actual='not_attempted'
            if [ -f "$RUNNER_TEMP/kakao-status.txt" ]; then
              actual="$(tr -d '\r\n' < "$RUNNER_TEMP/kakao-status.txt")"
              if [ -z "$actual" ]; then
                actual='not_attempted'
              fi
            fi
          fi

          echo "actual=$actual" >> "$GITHUB_OUTPUT"

      - name: Pull latest preview artifact branch files
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin codex/dev-preview
          mkdir -p docs/dev/debug
          git show origin/codex/dev-preview:docs/dev/index.html > docs/dev/index.html
          git show origin/codex/dev-preview:docs/dev/version.json > docs/dev/version.json
          if git cat-file -e "origin/codex/dev-preview:docs/dev/debug/${{ steps.vars.outputs.report_date }}.json" 2>/dev/null; then
            git show "origin/codex/dev-preview:docs/dev/debug/${{ steps.vars.outputs.report_date }}.json" > "docs/dev/debug/${{ steps.vars.outputs.report_date }}.json"
          fi

      - name: Verify rebuilt preview content
        id: verify_preview
        shell: bash
        run: |
          set -euo pipefail

          preview_path='docs/dev/index.html'
          if [ ! -f "$preview_path" ]; then
            echo "Preview file was not generated: $preview_path"
            exit 1
          fi

          final_preview_path="$RUNNER_TEMP/dev-preview-final.html"
          awk '/<details class="dbgWrap">/{exit} {print}' "$preview_path" > "$final_preview_path"

          blocked_urls=(
            'https://www.mt.co.kr/politics/2026/03/10/2026031009405991292'
            'https://news.kbs.co.kr/news/pc/view/view.do?ncd=8504583'
          )

          failed=0
          for url in "${blocked_urls[@]}"; do
            if grep -Fq "$url" "$final_preview_path"; then
              echo "Blocked URL still present in final preview content: $url"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Upload dev verify artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dev-verify-${{ steps.vars.outputs.report_date }}
          if-no-files-found: ignore
          path: |
            docs/dev/index.html
            docs/dev/version.json
            docs/dev/debug/

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Dev Verify Summary'
            echo "- Event: ${{ github.event_name }}"
            echo "- Content ref: ${{ steps.vars.outputs.content_ref }}"
            echo "- Report date: ${{ steps.vars.outputs.report_date }}"
            echo "- Smoke checks: ${{ steps.smoke.outcome }}"
            echo "- Build mode: ${{ steps.replay.outputs.actual_build_mode }}"
            echo "- Replay source: ${{ steps.replay.outputs.snapshot_source }}"
            echo "- Rebuild: ${{ steps.rebuild.outcome }}"
            echo "- Preview verify: ${{ steps.verify_preview.outcome }}"
            echo "- OpenAI model: gpt-5.4-mini"
            echo "- Kakao requested: ${{ steps.vars.outputs.send_kakao }}"
            echo "- Kakao actual: ${{ steps.kakao_status.outputs.actual }}"
            echo "- Preview: ${{ steps.vars.outputs.brief_view_url }}/"
            echo "- Preview branch: codex/dev-preview"
            echo "- Raw preview: https://raw.githubusercontent.com/NH-Horti/agri-news-brief/codex/dev-preview/docs/dev/index.html"
            echo "- Raw debug JSON: https://raw.githubusercontent.com/NH-Horti/agri-news-brief/codex/dev-preview/docs/dev/debug/${{ steps.vars.outputs.report_date }}.json"
          } >> "$GITHUB_STEP_SUMMARY"
