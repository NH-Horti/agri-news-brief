name: agri-news-brief (dev verify rebuild)

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Date to rebuild on dev run (YYYY-MM-DD)'
        required: true
        type: string
      send_kakao:
        description: 'Send Kakao message in dev verification run'
        required: false
        default: true
        type: boolean
      brief_view_url:
        description: 'Preview base URL used in Kakao link'
        required: false
        default: 'https://nh-horti.github.io/agri-news-brief/dev'
        type: string
      ux_patch_days:
        description: 'Patch recent archives after rebuild (0 = off)'
        required: false
        default: '0'
        type: string

permissions:
  contents: write

concurrency:
  group: agri-news-brief-dev-verify-dev
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dev verify rebuild (single preview page overwrite)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_CONTENT_REF: main
          GH_CONTENT_BRANCH: main

          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}

          PUBLISH_MODE: github_pages
          PAGES_BRANCH: main
          PAGES_FILE_PATH: docs/dev/index.html
          PAGES_BASE_URL: ${{ inputs.brief_view_url }}
          BRIEF_VIEW_URL: ${{ inputs.brief_view_url }}

          DEV_SINGLE_PAGE_MODE: 'true'
          DEV_SINGLE_PAGE_PATH: docs/dev/index.html
          DEV_SINGLE_PAGE_URL_PATH: index.html

          MAINTENANCE_TASK: rebuild_date
          FORCE_REPORT_DATE: ${{ inputs.report_date }}
          MAINTENANCE_SEND_KAKAO: ${{ inputs.send_kakao && 'true' || 'false' }}

          FORCE_RUN_ANYDAY: 'true'
          UX_PATCH_DAYS: ${{ inputs.ux_patch_days }}
          WINDOW_MIN_HOURS: '0'
          CROSSDAY_DEDUPE_ENABLED: 'false'

          MAX_PER_SECTION: '5'
          PAGE_TAIL_MARGIN_EXTRA: '4.0'

          NAVER_MAX_WORKERS: '1'
          NAVER_MIN_INTERVAL_SEC: '0.6'

        run: |
          python main.py