name: agri-news-brief (validate API secrets)

on:
  workflow_dispatch:
    inputs:
      check_naver:
        description: 'Validate Naver API credentials'
        required: false
        default: true
        type: boolean
      check_kakao:
        description: 'Validate Kakao token refresh credentials'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate Naver and Kakao secrets
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          CHECK_NAVER: ${{ inputs.check_naver }}
          CHECK_KAKAO: ${{ inputs.check_kakao }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request


          def append_summary(line: str) -> None:
              path = os.getenv("GITHUB_STEP_SUMMARY", "")
              if not path:
                  return
              with open(path, "a", encoding="utf-8") as fh:
                  fh.write(line + "\n")


          def write_output(name: str, value: str) -> None:
              path = os.getenv("GITHUB_OUTPUT", "")
              if not path:
                  return
              with open(path, "a", encoding="utf-8") as fh:
                  fh.write(f"{name}={value}\n")


          def redact(text: str) -> str:
              text = (text or "").strip().replace("\n", " ").replace("\r", " ")
              if len(text) > 300:
                  text = text[:300] + "...(truncated)"
              for key in (
                  os.getenv("NAVER_CLIENT_ID", ""),
                  os.getenv("NAVER_CLIENT_SECRET", ""),
                  os.getenv("KAKAO_REST_API_KEY", ""),
                  os.getenv("KAKAO_CLIENT_SECRET", ""),
                  os.getenv("KAKAO_REFRESH_TOKEN", ""),
              ):
                  if key:
                      text = text.replace(key, "***")
              return text


          def http_request(url: str, method: str = "GET", headers=None, data=None, timeout: int = 20):
              req = urllib.request.Request(url, headers=headers or {}, data=data, method=method)
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.getcode(), resp.read().decode("utf-8", "replace"), dict(resp.headers)


          check_naver = os.getenv("CHECK_NAVER", "true").strip().lower() == "true"
          check_kakao = os.getenv("CHECK_KAKAO", "true").strip().lower() == "true"
          failed = False

          append_summary("## Secret Validation Summary")

          if check_naver:
              cid = os.getenv("NAVER_CLIENT_ID", "").strip()
              csecret = os.getenv("NAVER_CLIENT_SECRET", "").strip()
              if not cid or not csecret:
                  failed = True
                  write_output("naver_status", "missing")
                  append_summary("- Naver: missing secret")
              else:
                  url = "https://openapi.naver.com/v1/search/news.json?" + urllib.parse.urlencode(
                      {"query": "농업", "display": 1, "start": 1, "sort": "date"}
                  )
                  headers = {
                      "X-Naver-Client-Id": cid,
                      "X-Naver-Client-Secret": csecret,
                  }
                  try:
                      status, body, _headers = http_request(url, headers=headers)
                      payload = json.loads(body)
                      items = payload.get("items", []) if isinstance(payload, dict) else []
                      write_output("naver_status", "success")
                      append_summary(f"- Naver: success (items={len(items)})")
                  except urllib.error.HTTPError as exc:
                      failed = True
                      body = exc.read().decode("utf-8", "replace")
                      write_output("naver_status", f"http_{exc.code}")
                      append_summary(f"- Naver: failed (HTTP {exc.code})")
                      print(f"[NAVER] HTTP {exc.code}: {redact(body)}")
                  except Exception as exc:
                      failed = True
                      write_output("naver_status", "error")
                      append_summary("- Naver: failed (request error)")
                      print(f"[NAVER] ERROR: {redact(str(exc))}")
          else:
              write_output("naver_status", "skipped")
              append_summary("- Naver: skipped")

          if check_kakao:
              rest_key = os.getenv("KAKAO_REST_API_KEY", "").strip()
              refresh_token = os.getenv("KAKAO_REFRESH_TOKEN", "").strip()
              client_secret = os.getenv("KAKAO_CLIENT_SECRET", "").strip()
              if not rest_key or not refresh_token:
                  failed = True
                  write_output("kakao_status", "missing")
                  append_summary("- Kakao: missing secret")
              else:
                  form = {
                      "grant_type": "refresh_token",
                      "client_id": rest_key,
                      "refresh_token": refresh_token,
                  }
                  if client_secret:
                      form["client_secret"] = client_secret
                  data = urllib.parse.urlencode(form).encode("utf-8")
                  try:
                      status, body, _headers = http_request(
                          "https://kauth.kakao.com/oauth/token",
                          method="POST",
                          headers={"Content-Type": "application/x-www-form-urlencoded"},
                          data=data,
                      )
                      payload = json.loads(body)
                      if not isinstance(payload, dict) or "access_token" not in payload:
                          raise RuntimeError(f"unexpected response: {redact(body)}")
                      write_output("kakao_status", "success")
                      append_summary("- Kakao: success (token refresh)")
                  except urllib.error.HTTPError as exc:
                      failed = True
                      body = exc.read().decode("utf-8", "replace")
                      write_output("kakao_status", f"http_{exc.code}")
                      append_summary(f"- Kakao: failed (HTTP {exc.code})")
                      print(f"[KAKAO] HTTP {exc.code}: {redact(body)}")
                  except Exception as exc:
                      failed = True
                      write_output("kakao_status", "error")
                      append_summary("- Kakao: failed (request error)")
                      print(f"[KAKAO] ERROR: {redact(str(exc))}")
          else:
              write_output("kakao_status", "skipped")
              append_summary("- Kakao: skipped")

          if failed:
              sys.exit(1)
          PY
