name: agri-news-brief (admin dashboard)

on:
  schedule:
    - cron: '20 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: agri-news-brief-admin-dashboard
  cancel-in-progress: true

jobs:
  build:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build admin analytics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GA4_ACCESS_TOKEN: ${{ secrets.GA4_ACCESS_TOKEN }}
        run: |
          python scripts/build_admin_analytics.py --output-dir docs/admin/data --search-index docs/search_index.json

      - name: Commit updated dashboard data
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- docs/admin; then
            echo "No dashboard updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/admin
          git commit -m "Update admin dashboard data"
          git push
