[mypy]
python_version = 3.11
strict = True
ignore_missing_imports = True
files = collector.py, io_github.py, retry_utils.py, schemas.py, ux_patch.py, ranking.py, orchestrator.py, observability.py, main.py, replay.py, hf_semantics.py

[mypy-main]
strict = False
warn_return_any = True
warn_unused_ignores = True
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-replay]
strict = True

[mypy-hf_semantics]
strict = False
check_untyped_defs = True
